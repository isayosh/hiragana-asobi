<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>おなまえ れんしゅうちょう</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main id="app">
  <a class="home-link" href="../">⬅ ひらがな あそび</a>

  <h1>✏️ おなまえ れんしゅう</h1>
  <p class="name-big" id="name-big"></p>

  <!-- たて / よこ の きりかえ -->
  <div class="mode-row" role="group" aria-label="かきかたの きりかえ">
    <button id="mode-yoko" class="mode-btn is-on">よこがき ➡</button>
    <button id="mode-tate" class="mode-btn">たてがき ⬇</button>
  </div>

  <!-- れんしゅうシート -->
  <div class="sheet-wrap">
    <div id="sheet" class="horizontal"></div>
  </div>

  <div class="tool-row">
    <button id="replay-btn" class="big-btn">▶️ かきじゅん</button>
    <button id="name-sound-btn" class="big-btn">🔊 おなまえ</button>
    <button id="clear-btn" class="big-btn">🧽 けす</button>
    <button id="sheet-done" class="big-btn done-btn">🌸 できた！</button>
  </div>
  <p class="trace-hint">✏️ ゆびで なぞって おなまえを かいてみよう！</p>

  <!-- １もじずつ おおきく れんしゅう -->
  <p class="hint">🔍 もじを タッチすると おおきく なぞれるよ</p>
  <div id="char-chips"></div>

  <footer>
    筆順データ: <a href="http://kanjivg.tagaini.net" target="_blank" rel="noopener">KanjiVG</a>
    (CC BY-SA 3.0)
  </footer>
</main>

<!-- １もじを おおきく れんしゅうする がめん -->
<section id="char-screen" hidden>
  <div class="detail-top">
    <button id="detail-back" class="big-btn">⬅ もどる</button>
    <button id="detail-sound" class="big-btn">🔊 おと</button>
  </div>

  <div class="big-stage-wrap">
    <div id="big-stage"></div>
    <div class="stage-buttons">
      <button id="detail-replay" class="big-btn">▶️ かきじゅん</button>
      <button id="detail-clear" class="big-btn">🧽 けす</button>
      <button id="detail-done" class="big-btn done-btn">🌸 できた！</button>
    </div>
    <p class="trace-hint">✏️ おおきく なぞってみよう！</p>
  </div>

  <div class="nav-row">
    <button id="detail-prev" class="big-btn">⬅ まえ</button>
    <span id="detail-pos" class="detail-pos"></span>
    <button id="detail-next" class="big-btn">つぎ ➡</button>
  </div>
</section>

<!-- ごほうび（花丸＋紙吹雪）の えんしゅつ -->
<div id="celebrate" class="celebrate" hidden>
  <canvas id="confetti"></canvas>
  <div class="celebrate-card">
    <div class="hanamaru">💮</div>
    <p class="celebrate-text">よくできたね！</p>
    <button id="celebrate-close" class="big-btn">🙌 もういちど</button>
  </div>
</div>

<script src="../strokes.js"></script>
<script src="app.js"></script>
</body>
</html>
